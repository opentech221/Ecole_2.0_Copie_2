name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Security audit gate
        run: |
          pnpm audit --json > audit.json || true
          node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('audit.json','utf8'));const t=r?.metadata?.vulnerabilities?.total ?? 999; if(t>0){console.error('Vulnerabilities detected:', t);process.exit(1)};console.log('No vulnerabilities detected')"
