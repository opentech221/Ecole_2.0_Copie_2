<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hors ligne - Ecole 2.0</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Plus Jakarta Sans", "Segoe UI", Arial, sans-serif;
        background: linear-gradient(180deg, #f8fafc, #ffffff);
        color: #0f172a;
        padding: 24px;
      }
      .card {
        max-width: 480px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 30px rgba(15, 23, 42, 0.1);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }
      p {
        margin: 0;
        line-height: 1.5;
      }
      .hint {
        margin-top: 14px;
        font-size: 0.92rem;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main class="card" role="main" aria-live="polite">
      <h1>Vous êtes hors ligne</h1>
      <p>L'application est indisponible temporairement sans connexion réseau.</p>
      <p class="hint">Revenez en ligne pour synchroniser les données, ou revenez en arrière pour consulter les écrans déjà chargés.</p>
    </main>
  </body>
</html>
